<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <!-- webOS usually requires this exact viewport for 1080p -->
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>AniWebOs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <h1 id="title">AniWebOs</h1>
        <p>¡Bienvenido a tu aplicación de anime para webOS TV!</p>
        <div class="button-container">
            <button id="btn-play" class="focusable" autofocus>Reproducir</button>
            <button id="btn-catalog" class="focusable">Catálogo</button>
            <button id="btn-settings" class="focusable">Ajustes</button>
        </div>
        <div id="status">Presiona las flechas del control remoto (Magic Remote) para navegar.</div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
